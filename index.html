<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=5, user-scalable=yes"
    />
    <title>宇昊生日菜谱</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="orientation-guard" id="orientationGuard" aria-hidden="true">
      <div class="orientation-guard__inner">
        <div class="orientation-guard__icon">↺</div>
        <p>请横屏查看</p>
      </div>
    </div>
    <main class="app" aria-live="polite">
      <section class="book" aria-label="生日菜谱书">
        <button class="nav-icon nav-icon--left" id="prevPage" type="button" aria-label="上一页" title="上一页">
          <span aria-hidden="true">‹</span>
        </button>

        <article class="spread" id="spread">
          <section class="page page--cover is-active" data-page="cover">
            <img class="cover-photo" src="WechatIMG4171.jpg" alt="自制香料烤鸡拼贴" />
            <div class="cover-shade"></div>
            <div class="cover-copy">
              <p class="kicker">Birthday Recipe Book</p>
              <h1>🥕的专属菜谱</h1>
              <p>朋友们递来的几道菜，<br />装订成一本可以翻开的网页书。</p>
              <button class="primary-action" id="openBook" type="button">翻开菜谱</button>
            </div>
          </section>

          <section class="page page--catalog" data-page="catalog">
            <button class="page-close" id="closeCatalog" type="button" aria-label="回到目录" title="回到目录">×</button>
            <div class="page-heading">
              <h2>目录</h2>
            </div>
            <ol class="recipe-index" id="recipeIndex"></ol>
          </section>

          <section class="page page--recipe" data-page="recipe">
            <button class="page-close" id="closeRecipe" type="button" aria-label="回到目录" title="回到目录">×</button>
            <div class="recipe-toolbar">
              <div class="page-count" id="pageCount">1 / 15</div>
            </div>
            <div class="recipe-shell" id="recipeShell"></div>
          </section>
        </article>

        <button class="nav-icon nav-icon--right" id="nextPage" type="button" aria-label="下一页" title="下一页">
          <span aria-hidden="true">›</span>
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
